name: Build Tactocraft APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip curl openjdk-17-jdk autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev build-essential

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install buildozer cython virtualenv

      - name: Install Android command line tools
        run: |
          set -e
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          rm -rf "$SDK_DIR/cmdline-tools" "$SDK_DIR/tools"
          mkdir -p "$SDK_DIR" /tmp/android-cmdline
          curl -fsSL -o /tmp/commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q /tmp/commandlinetools.zip -d /tmp/android-cmdline
          mkdir -p "$SDK_DIR/cmdline-tools"
          mv /tmp/android-cmdline/cmdline-tools "$SDK_DIR/cmdline-tools/latest"
          mkdir -p "$SDK_DIR/tools/bin" "$SDK_DIR/licenses"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" "$SDK_DIR/tools/bin/sdkmanager"
          "$SDK_DIR/tools/bin/sdkmanager" --version
          yes | "$SDK_DIR/tools/bin/sdkmanager" --sdk_root="$SDK_DIR" --licenses > /dev/null || true
          "$SDK_DIR/tools/bin/sdkmanager" --sdk_root="$SDK_DIR" "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          test -x "$SDK_DIR/tools/bin/sdkmanager"
          test -f "$SDK_DIR/build-tools/35.0.0/aidl"

      - name: Build debug APK
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tactocraft-Mobile-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7
