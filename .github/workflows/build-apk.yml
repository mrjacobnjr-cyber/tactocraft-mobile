name: Build Tactocraft APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev build-essential

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install buildozer cython virtualenv

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p "$HOME/.buildozer/android/platform/android-sdk/licenses"
          printf '24333f8a63b6825ea9c5514f83c2829b004d1fee\n' > "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license"
          printf '84831b9409646a918e30573bab4c9c91346d8abd\n' >> "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license"
          printf 'd975f751698a77b662f1254ddbeed3901e976f5a\n' > "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license"

      - name: Build debug APK
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tactocraft-Mobile-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7
